body:
  text: 景景醫話腸癰族侄欽文號佩珊其高祖自蘇遷常惕身叔名爾昭之孫也赴日本遊學返見余曰赴東入普通學校一年方畢業患腸癰入醫院東醫曰是不難剖而去之可也不旬日已平復詫以為神遂即以東醫為師在千葉縣專門醫學校習業又二年學成今得畢業文憑而返余詳問其狀亦甚驚異嗣赴常赴寧忽聞其又驟赴日本未知何事不一月得其家中書來謂舊病復發不能自療急至日本求其師醫治師仍曰是不難剖而去之可也乃不料一剖後溘然未醒不知何以昔者效而今不效余默思其故前者之效氣血未衰愈後失調元未復而病根仍在後者之不效氣血已衰是以遽殞耳乃知猶是病也而體之虛實不可以不辨混同治之可乎哉急勞江建霞名標余至好也一夕筵次聞其咳嗽余曰君咳不暢有外邪閉塞肺經宜服開泄藥江曰有西醫勸服止嗽藥水擬即服之矣余曰西藥余未詳其性但顧名思義恐是劫劑古云傷風不醒便成勞似不宜服渠意不謂然江與余省試先後出汪瑤庭先生門時汪任長邑其明日為師母壽誕約祝壽再見至明日江不至晚筵時瑤師云江僕來言建霞病不來矣以為小恙未之省視又匝月餘聞噩耗為之駭然不意筵次一別遂成永訣後晤其兄宵緯云病重時曾至曹君智涵處診治曹極言病險建霞猶不為然曹告其家人曰尺脈弱甚腎虧已極余細思之此猶是邪留於肺肺病金不生水為止嗽藥水強止其嗽之害蓋腎陰素虧者肺熱液涸腎無來源往往不起勞瘵中有七日之急勞半由於此人皆以為日甚短不疑其為勞耳走馬牙疳余友範某其岳父走方醫也有草研爛以少許貼山根取泡挑破治走馬牙疳極效範識其草到處皆有而不知其名余曾囑其覓來植諸盆不久即萎繼余侄女患是病兄來索此草無以應但以意會之囑其用喉科中異功散少許和蒜搗爛亦于山根取泡果效記得張舜欽傳方用斑蟊麝香白胡椒調薄荷油貼兩太陽穴取泡治頭痛如刀劈者亦此意也病之經絡不同則貼之穴道亦異以此類推當再可以治他病之宜拔毒外散者西法化驗見某報紙載有人患恙鄰予以單方藥兩味系大辛大溫發汗散氣者服後即殞某告諸公庭命西醫取藥化驗皆無毒余按凡病之不在表者及表分素虛者皆忌表病之不在裡者及在裡而不實者皆忌下故麻黃細辛大黃芒硝並足以殺人即和平之品苟不對症亦足以輕病變重重病致死取諸藥以化驗豈必有毒乎倒視民立報載美國阿倭吾亞市有少年格柏魯迭拉其官能之奇異映於眼者順皆為逆如下樓梯則目為上而墜落者屢矣馬車從右來則目為左而沖僕者又屢矣就診於紐約專門醫希蒙博士據云系因視神經有異狀之故竊考名醫類案載呂滄洲案視物皆倒植謂為倒其膽府陳古老案視正物皆斜斜者反正謂為閃倒肝之一葉搭於肺上又某方書云桌椅等平者反側側者反正者此胸膈有伏痰也魏玉璜駁陳案謂肝去肺位甚遠安能上搭余謂目系內連肝膽此就痰滯膽絡治用膽星半夏絲瓜蔞實赤芍等當不致誤錢仲陽用郁李仁治目張不得瞑此藥潤而散結亦可移治至孫真人謂風入腦則視一物為兩李東垣謂食辛熱物太甚辛主散熱助火上乘於腦則視物無的實以小為大以短為長張子和謂痰熱病則目視壁上皆是紅蓮花與上症雖稍異而皆可互參惟視一為兩視小為大痰症有之虛症亦多精散故也須於脈證詳辨之痧穢宜嚏過飽宜吐吳尚先理瀹駢文略言云上用嚏自注嚏即吐也在上宜嚏感邪從口鼻入宜嚏按嚏法與吐法異凡六淫之氣從鼻人者宜用嚏就其受病之處驅而出之故五六月暑濕時令所感氣兼穢濁發為痧症尚未入營分者取嚏即愈以其邪在清道也是即經所謂天牧從來復得其往氣出於腦即不幹邪者是若飲食不慎或過飽而填息或感穢氣而與胃中之宿食痰飲為伍上填胸膈則宜用吐吐必病本從口入亦就其受病之處驅而出之但嚏法吐法俱治邪之在上焦者要不得云嚏即是吐也推之風寒之宜發汗風熱之宜涼表花柳病之宜通利精竅皆就其受病之處驅而出之斯即病在上焦毋犯中下病在下焦毋犯上中之旨痧症鼠疫又按痧症必有時行穢濁之氣夾雜而成亦瘟疫之類特其輕焉者耳至時行極盛互相傳染比戶皆然便是疫矣其病亦由表入里由衛氣而入營血其初起自鼻入者固得嚏即愈其氣自口入者用葉天士炒香枇杷葉方飲之其自皮毛入者用刮痧法最佳藥則芳香逐穢為主而視其兼症以成方若病已深入營分則宜刺委中穴僅在氣分者不宜刺也昔遊閩垣鼠疫盛行詳究其病由濕熱成毒深入血分壅塞經絡窒不能行隨所窒而結核明是熱病而用涼則更遏伏用溫則又助毒益劇惟急刺委中穴出血再用紅花川芎天仙藤等溫藥以通絡活血即繼以犀角紫草丹皮鮮生地絲瓜絡等涼藥以通絡涼血兩方之進相間不過鍾許庶幾有濟否則初方嫌性溫助熱矣余曾用之有驗寒包暑熱一方面溫涼藥並用或先後分用皆就其病以施治非必用溫者必不可用涼用涼者必不可用溫也余前在湘省襄某中丞幕一日中丞出中軍阮某隨行時溽暑鬱蒸比返大雨驟寒將進署阮某衣履盡濕忽墜馬昏倒舁入譫語喃喃言有人揪之下索博負群以為祟余診之脈沉分洪數有力而無汗膚如灼引被自蔽猶惡寒余曰此連日之暑熱為一時之寒濕所束也宜先辛溫以發汗俟表分之寒濕去然後辛涼以解之乃用羌活香薷蘇葉陳皮等令其先服又預開白虎湯去粳米甘草加西瓜翠衣扁豆衣囑其煎就曰候脈浮汗多時即接服之果也服初方後汗出而多非但不惡寒且惡熱特甚至裸體赤身進第二方逾時汗斂熱退神識清楚晚膳時霍然矣此等症候日間受暑晚間貪涼之輩往往有之治法亦無奇異本不足記因論鼠疫之宜先溫後涼而連類及之久咳風溫咳風寒醫苟能知其理並知各物之性則雖尋常各物無在而非藥物也曩者宰閩之安溪其俗樸野視官如神明一日有執香而踵門者吏曰此其家有病人而來求藥者也不必問其何病亦不必定是藥物隨意與以食物習俗如是彷彿如求仙方然其愚真可嗤余姑訊何病則曰久咳喜飲因思久咳則無庸開泄適席間有梨予以二枚囑其煎服而愈以熟梨能潤肺燥也又進京在船遇一友患咳不暢友曰登舟才咳苦幹有醫而無藥余曰是不難診之脈浮數舌苔薄黃症屬風溫因囑其取包南貨之干箬葉煎一大盂服之而咳暢以是物辛涼泄肺也又一次夏令晉京遇一新學家嫌艙中人多氣熱另臥艙面謂可得空氣天明時發熱惡寒無汗困憊甚茶房扶之下與余商同一艙詢其欲服藥否渠曰奈船中無藥何余曰是不難症屬風寒因囑其取白蘭地酒一大杯和以薄荷酒一小杯溫而服之蓋被取汗亦應手而愈以兩酒合服辛溫發表也此三事近於遊戲均無足述拉雜書之聊助談資云爾二便不通顧緝庭先生引余為忘年交詩酒往還過從甚密自卸招商局事後僑居吳鄉之木瀆鎮蹤跡稍稀然偶來城必晤面見其行步蹇遲語言錯亂知其老衰矣閱一年歲首聞其病二便不通臥則小便又自遺少腹有瘕塊心嘈雜飢欲食食至又不欲食醫用通利二便之劑不應余曰考金匱真言論云北方黑氣入通於腎開竅於二陰趙獻可醫貫云腎氣虛則大小便難宜以地黃蓯蓉車前子茯苓之屬補其陰利水道少佐辛藥開腠理致津液而潤其燥又難經云腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時又經脈篇云腎足少陰之脈是動則病飢不欲食又玉機真臟論云冬脈不及則令人心懸如病飢張注謂腎為生氣之原不及則心腎水火之氣不能交濟張潔古活法機要云壯人無積虛人則有之若遽以磨堅破結之藥治疾去而人已衰故治積當先養正今病大小便不通少腹有瘕塊非腎病而何腎氣虛則滯故有瘕塊滯而下墜阻塞隧道故小便不通臥下氣升則阻塞為開故小便又自遺時時欲食者不關於胃乃心腎不交所致所謂心懸如病飢非真飢也治宜補腎氣以交心佐以散滯升墜之品擬用坎離丹先服以交其心腎續用遠志茯苓蓮子沙苑子肉蓯蓉巴戟天枸杞子枳殼升麻地黃丸等方交郵局寄鄉不及服而已殞此方應否不可知姑志於此以俟高明之評隲神昏譫語葉天士曰溫邪上受首先犯肺逆傳心胞又云舌色純絳鮮澤者胞絡受邪也平素心虛有痰外熱一陷里絡即閉非菖蒲鬱金等所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也吳鞠通云太陰溫病汗出過多者必神昏譫語清宮湯主之牛黃丸紫雪丹局方至寶丹亦主之又云溫毒神昏譫語者先與安宮牛黃丸紫雪丹之屬繼以清宮湯又云手厥陰暑溫身熱不惡寒清神不了了時時譫語者安宮牛黃丸主之紫雪丹亦主之又云夜寐不安煩渴舌赤時有譫語暑入手厥陰也清宮湯主之舌白滑者不可與也王孟英說亦大略相同於是後之醫家因陋就簡據此數書遂以為道盡於斯也一遇神昏譫語為葉吳輩印定眼目便以為治溫熱病在手經而不在足經一若人身果分兩截漠然不相關者於是群以為心包絡病矣詎知其不專屬心包絡乎王晉三云病起頭痛而後神昏不語者此肝虛魂升於頂當用龍骨牡蠣救逆以降之非至寶丹等所能蘇也此則神昏屬諸肝李東垣云熱入血室晝則明瞭夜則譫語夫血室者肝臟也既曰晝則明瞭夜必不明瞭可知不明瞭即神昏之謂此則神昏亦屬諸肝但王說魂升於頂之神昏乃肝虛李說熱入血室之神昏乃肝實此則有異內經熱論云陽明者十二經脈之海其氣血盛故不知人金匱中風篇云邪入於府即不識人趙以德注謂胃為六府總司諸府經絡受邪必歸於胃胃熱甚津液壅溢結為痰涎閉塞隧道堵其神氣出入之竅故不識人徐忠可注謂將頸兩人迎脈按住其氣即壅遏不識人人迎者胃脈也夫所謂不知人不識人者非即神昏而何此則神昏又屬諸胃裴兆期醫談曰人謂神昏之病原於心心清神乃清余謂神昏之病原於胃胃清神乃清胃氣一有不清即不能攝神歸舍是神之昏不昏專在乎胃之清不清不觀酒醉之人乎酒醉之人醉胃不醉心也何以神昏而言語無倫也不觀飽食填息之人乎飽食之人飽胃不飽心也何以神昏而一時瞀亂也不觀痰涎壅塞之人乎痰塞之人塞胃不塞心也何以神昏而瞑眩無知也以上諸說豈醫者未之見耶抑以為不足信耶他書姑勿論至內經金匱而未之見不復信則何必為醫然近人亦非無知之者余伯陶云陽明之火蒸騰入腦神即昏矣則神經之昏明明是神經受熱究其神經之所以熱仍由陽明而來即經所謂悍氣上衝頭也余氏說與徐忠可說當互參蓋人迎胃脈由胃過頸後入腦悍氣即循此脈上衝然則臚考諸說神昏屬胃者多屬肝者亦有之安得專屬諸心包絡哉再論譫語內經厥論云陽明之厥妄見而妄言張仲景云三陽合病腹滿身重口不仁而面垢譫語遺尿白虎湯主之雖曰三陽合病而六腑之邪盡歸於胃此則譫語屬諸胃仲景又云陽明病其人多汗以津液外出腸中燥大便必鞕鞕則譫語小承氣湯主之又云陽明病譫語有潮熱反不能食胃中必有燥矢宜大承氣湯下之此則譫語亦屬諸胃惟內經論厥而妄言統胃經胃腑言之仲聖論用白虎湯者屬胃經之熱用大小承氣湯者屬胃腑之實此則有辨而其譫語屬胃則一也故崔尚書云胃有燥糞令人錯語邪熱盛亦令人錯語若便秘而錯語者宜承氣湯便通而錯語者宜黃連解毒湯錯語語言錯亂之謂與譫語義同是崔說亦分胃腑胃經以論治然亦有不屬胃者內經厥論云厥陰厥逆譫語張隱菴注謂肝主語譫語者肝氣鬱也傷寒論中讝語千金方俱作譫語可見二字音義並同王肯堂云下血譫語頭汗出者熱入血室也葉天士云熱陷血室與陽明胃實多有譫語如狂之象當辨之血結者身體必重非若陽明之輕旋便捷此則譫語又屬諸肝然則臚考諸說譫語亦屬胃者多屬肝者間有之安得專屬諸心包絡哉余上年治城內和尚濱馬姓兒病神昏譫語當時以伊父亦知醫理與之辯論後開方而未列案即就肝胃兩經用藥為羚羊角石決明陳膽星枳實汁鮮竹瀝生瓜蔞打元明粉等寥寥數味乃諸醫見之群譁為非因補一案曰病交十二日矣初起發黃咳嗽或有外感辛以散之理原不謬但辛熱以治風寒辛涼以治風熱已自有別以辛溫治風熱已致引動木火已屬醫家之用藥不細三四日間案中有左脅痛惡吐環唇青等候脅屬肝之部分唇屬脾胃部分青乃肝色全屬肝邪犯胃見症此時何猶因咳嗽未止而純用肺家開泄藥耶內僅一方加用鉤藤是肝藥矣然鉤藤雖清肝熱而息肝風為主肝熱而不至熱極生風者與夫肺表外感風熱者早用之反足以引動內風醫家曾知之否此時之咳嗽未止已屬木火刑金所以愈開泄而愈劇也洎乎木火熾盛爍胃液而成痰復挾痰以上蒙遂致神昏譫語理當援仲景胃熱之例兼涼肝降痰以清之以其又大便久不通滿腹脹痛拒按轉矢氣也當兼參仲景胃實之例以下之何諸醫於辛散泄肺而後一變而即用清宮湯至寶丹耶前者失諸不及後者失諸太過其為誅伐無過則一也余方不用白虎承氣而另撰一方者以其病不獨在胃而肝邪特甚故用仲聖之法而不用仲聖之藥師其意不必襲其方也質諸高明以為然否按前期寒包暑熱條阮某譫語即屬胃熱如誤用牛黃丸至寶丹等領邪入內必然不救並無繞臍痛按之有物轉矢氣等候倘用承氣亦不救胃熱之中又有兩法其不兼濕者則用白虎湯其兼濕邪者則用三黃石膏湯黃連解毒湯以苦能燥濕也上期醫學報袁桂生札記與予說同余君伯陶之論神昏屬陽明袁君桂生之論神昏譫語不可只用清宮湯紫雪丹至寶丹可見世固不乏高明之士殆所謂鐵中錚掙庸中佼佼者歟用藥分量用藥分量之輕重鄙意當視其病以為準初不能執定某藥必重用某藥必輕用即古方流傳其分量固已酌定仍必賴用之者增損其間乃合病機不獨藥品之宜加減也所謂君臣佐使即別之於分量故同一方也有見此證則以此藥為君見他證復以他藥為君者朱應皆云古方所謂各等分者非同一分量之謂謂審病以定藥之輕重耳斯言甚確余前治袁姓兒濕溫症案曰滿舌苔薄白而帶滑濕在肺胃之表也邊尖絳赤心肝營分有熱也中心獨灰微澀胃聚濕而欲化火也小便短赤大便秘火鬱濕滯而氣化不靈也濕為火爍則生痰痰氣上蒙故欲昏睡也其有時能冷飲者則濕從火化已熱多濕少也有時足冷熱內迫也須防其熱厥新又咳嗽君相二火爍金也宜清心肝之火導以下行滲肺胃之濕以佐之斯熱解而濕亦去矣藥用淡竹葉燈心草石決明通草白茯苓生苡仁知母茅根蘆根碧玉散鮮竹瀝內以別無痰藥竹瀝用四兩分頭二煎衝入有訾余分量太重者匡予不逮幸甚錄此方案以志吾過猶憶去年鄒君鶴濤病譫語如狂時欲出門其力甚大余疑其痰火上壅而脈象沉細若無脈證不符欲用羚羊角竹瀝而不敢轉延余君伯陶決之余君亦疑不可乃商酌一方服之當日稍定翌日忽奪門而出至其相知家酣睡比醒診之脈忽變為滑數而大乃知昨系熱厥伏匿之脈因用羚羊角以鮮竹瀝磨之隨磨隨進只此二味計是日磨去羚羊角五錢許竹瀝十三四兩稍有狼戾飲下亦復不少較此症用之更多病之輕重固異然至今思之治雖幸中究嫌孟浪懸壺應世誠不如以平易藥方輕微分量免為庸流所詬病耳胎黃癸丑五月十二日五孫欽尚生生而面目身皆黃此胎黃也似其小便清長疑是虛寒然身體壯盛啼聲載路唇色紅紫察其瞳子黑而有神且伊父系木火體質伊母系濕痰體質因決其為濕熱無疑但質小不能服藥思吳尚先云內服之方皆可移作外治遂用綿茵陳赤小豆海螵蛸馬鞭草紫花地丁生草梢仙半夏大腹皮小青皮炒白朮赤白芍赤苓白頸蚯蚓等共研細末酒調敷臍上日再易兩旬而全愈可見小兒之不能服藥者類推可以改外治如病在頭目則敷兩太陽病在臂腿則敷手足心病在胸膈則敷胸間病在肺則敷肺俞等穴病在肝則敷期門等穴病在脾胃則敷臍腹視何病則用何藥溫涼攻補因病而施想亦有效也鼻衄賴佩瑜函詢敝邑有孔某者年二十許自十四歲以來得一鼻衄奇症每逢月之上旬七句鍾時其鼻血源源而來投之截血諸藥終不能禁止其流迨至次日呼吸始通衄血亦時來時止三日後其衄血自然而愈測量其血多至五磅有奇察其病時病後神識俱清兼無別病但此症自發生以來月累一月毫無過期誠世界最新發明之一大奇症也所延醫治已閱百人投諸藥石俱無效驗延至今春邀余診視切其脈大而且沉察其面色非象失血之人兼無寒熱煩咳惟不得安眠檢前所服之方不外瀉心地黃柏文等湯均歸無效僕採擇古今醫書研究斯症皆系真陽不足之弊故先擬服獨參湯加附子五錢連服數劑至後月復作如前再擬早服加減歸脾湯晚服黃土湯至三閱月衄復如是其或藥不對症歟即或四五劑不能中病歟究意是何理由敢以質之高明家余答之曰素問謂邪客於足陽明之經令人鼽衄靈樞謂胃足陽明之脈起於鼻之交頞中下循鼻外所生病者鼽衄是衄病有屬胃者胃為多氣多血之鄉故來多而無害考蟲證必月初其頭上向安知此衄之來非即胃中蛔蟲為患大約病者體必壯實嗜濃厚多濕熱鬱蒸生蟲攻動其贏餘之血激而上衝其不得安臥亦胃不和之故經所謂胃不和則臥不安也觀其積久而面色如常決非虛症擬用生牛膝姜炒竹茹刺蝟皮山梔子川楝子法半夏蕪荑琥珀等稍加以大黃末乾漆末逐月於病發時服之或能漸減而愈古本有胃蠱一症用使君子五穀蟲雷丸厚朴以殺蟲但不見其變病為衄耳竊謂天地之大無奇不有陰陽之對待有時而勝負迭乘故有五不女之奇形即有五不男之異稟安知此人非有生以來雖具乾健之體實賦坤順之性者乎月事之來上應乎月下應乎潮月初月上鉤而潮生月望月正圓而潮盛月屬陰象潮為陰質仲秋陰氣最足故月最明而潮最大女亦陰類月事應之世既有不月之婦人安必無有月之男子猶世有無須之男子間有有須之婦人倘詢其陽道不舉可證我說之不盡無稽但血與經二而一者也血以下行為順仍當用生牛膝大黃槐角等以導之使從大腸出耳從大腸出則不必復治之矣奇想也而實由理想姑附載之以博諸公一粲濕溫疝氣風疹熱人血室陽明經白虎證天花時氣辛亥秋余晉引南旋奉楊俊卿文鼎中丞奏隨赴秦在滬未行會武漢革命事起道阻不得往時事日非遂壺隱淞濱親友延余診治者公啟一函為余榆揚由孫燕秋文詒主稿孫亦知醫者函中頗於醫理有所闡發故錄出且以志厚誼於勿諼焉函陸君晉笙向與都人士遊鮮知其能醫者即或知之亦不意其邃於醫者自避來申顏其居曰景景醫室應病家之招誠保患濕溫嘉年之侄應歡亦患濕溫君謂彭某體肥濕重熱輕鄒某體瘦熱重濕輕同一滲濕清熱而分量不同承豫亦患濕溫君謂熱為濕遏宜先溫化然後用苦寒淡滲其治法又不同家怡患腹脹疝氣偏墜痛不可忍君謂舌苔白膩而厚是肝氣為寒濕所遏用蒼朮厚朴柴胡茴香等一劑而愈翌日已出門廷韶兩子並患疹君謂長者有汗兩關數甚宜石膏決明幼者無汗宜荊芥薄荷而方中之以辛涼解表則又同文詒子疹兼泄瀉君謂是肺移熱於大腸邪有去路於病為順斷不可升提止澀又不可因勢下導下導則表邪內陷疹透邪盡則泄自止其言果驗元基子患疹內隱反見惡寒等象或以為寒將用桂朮橘半君謂不可此溫熱內伏改用牛蒡豆豉淡豆卷銀花丹皮石膏而安承豫一子一女併發熱惡寒君謂鼻塞微咳目含水氣將發疹矣先以發透之自見疹至全愈曾無多劑未誤治治也國楨女患風溫發疹經方來而忽止君用辛涼之劑而佐以丹皮丹參等又見其治周姓女同患風溫經將盡而邪襲入君亦用辛涼之劑而佐以元參生地等同一熱入血室而君謂一血虛一有瘀是以佐使之藥異且病皆屬熱是以一不用桃仁茺蔚一不用川芎當歸也又見其治周姓子面赤大汗神昏譫語或以為邪入心包君謂呼之神清左寸不數右關浮滑數此白虎證也誤用清心丸至寶丹則反領邪入內矣嘉年之侄孫女年九歲幼居北地曾種牛痘今患似疹者累累君謂此天花也乃從前餘毒未淨北地高寒蓄而不泄今南來感時氣而發雖云痘出五臟古法用溫然今乃熱毒傷陰斷難泥古用解毒養陰藥而痊靜章兩子相戲傷長者胸痛甚靜章以為傷也君視之曰非是適感時氣氣阻胸膈耳用疏表氣分而愈設投行血消瘀之劑誤矣他如溥孫之急類中風人龍內子之患大頭風盛年之子女子婦孫輩患各症無不藥到病除此外目擊其治驗更指不勝屈姑就嘉年等熟人賴其治愈者略述一二為之表彰以鳴謝忱鄒嘉年潘盛年馮廷韶孫文詒金國楨顧元基彭溥孫潘靜章彭誠保錢人龍劉家怡汪承豫同啟肝氣為濕熱所遇痘不化漿虞師涅邃於醫而不行道見滬上二醫之謬著是名醫而非庸醫辨余因其於醫道有所稗益故錄之其辨云友人告余曰治許嫗肝氣為濕熱所遏理宜辛溫以舒肝鬱苦寒以清濕熱某醫案云木火內寄脾胃受侮升降失司以致脅痛痰多神疲嗜臥苔黃脈細弦滑數而藥則用旋覆花海浮石杏仁象貝杷葉等肺家藥為多方案不符未識何故陳君有女患痘點已齊備而未化漿考漿之不化其因有二一則毒氣熾盛血燥而凝不能運化成漿法宜清血化毒一則元氣虛弱血寒而滯亦不能運化成漿法宜溫補內托延診治其案明云痘點齊而漿未化乃藥則用皂角針筍尖大力子等攻透之品亦方案不符未識何故余曰此其所以為名醫也夫所謂名醫者聯絡同道互相標榜延必厚值出必高車一病幸中便侈然自譽罔顧匿笑於旁觀是不務其實而務其名也吾故曰名醫也至於庸者平庸之謂雖不能傑出尋常而猶不至謬妄陋劣其頭痛醫頭腳痛醫腳而莫明其所以然故或愈或否重為世詬然何至自相矛盾方案不符耶是則若輩並不獲在平庸之列吾故曰非庸醫也夫夏桀殷紂茶毒生靈二醫殆其苗裔故草管人命以致於此僕將輯其謬方謬案指摘駁辯刊以問世名之曰伐罪編庶幾人知其謬而枉死者鮮當亦慈善之一端雖然世俗驕奢人心澆薄天道福善而禍淫水劫火劫兵劫疫劫之未已而更加以醫劫是天意也於二醫乎何尤神昏譫語前論神昏譫語義有未盡因再言之此證並非無屬心包絡者但不專屬諸心包絡耳其屬諸心包絡者病在上焦葉天士云舌色純絳鮮澤者胞絡受邪吳鞠通云夜寐不安煩渴舌赤暑入手厥陰也又云舌白滑者不可與也心為君主義不受邪邪入即死包絡與心相附居膈上代君行事臣使之官其能受邪者胞絡也凡古今方書所言心病者皆包絡病也故真心痛者不治包絡受病與心相鄰症已危險色絳屬心故葉天士以舌色純絳鮮澤為候吳鞠通以舌赤為候復申其誡曰舌白滑者不可與又云色絳而舌中心或黃或白者此非血分乃上焦氣熱爍津也其辨明絳而中心黃白者非血分病正恐人誤作心包絡病治之耳可見葉吳輩於神昏譫語症苟遇舌苔黃白者亦並不以牛黃丸至寶丹等治之既不以牛黃丸至寶丹為治豈遂別無治法我於此知葉先生時必然世多以治胃治肝者療神昏譫語絕不知溫邪有襲入心包絡症爰著溫熱論以救其失乃近今醫家不復博覽群書細辨病症手一捲溫熱論溫病條辨溫熱經緯遂以為道盡於是而其於不可與之誡全未細察葉吳輩豈任咎哉腫脹後昏厥熱病經來肝藏血而主疏泄故陰虛火旺之體每有水不涵木木火內熾血不能藏失其疏泄之常而月經先期而至或因熱病而未期驟至者此須涼肝涼血為要經初至一日或有瘀積可用涼血而動血者如丹皮之辛以流動之丹參之下行以暢達之二藥性雖寒涼決不至凝澀不行醫家輒用桃仁紅花澤蘭等溫劑謂寒涼則血凝滯不知此蓋指苦寒而味不辛性不下行者而言設熱病而用溫劑以助熱害不勝言經將淨時則並此二藥亦不可用須白薇紫草生地等涼血而不動血者治之矣昔治張紹庭景羲女驟然昏厥至三時之久紹庭見昏厥即來延余余適出診松江又延葉晉叔君葉亦適他出紹庭惶急萬狀知餘三鍾返在寓守候余歸即同往猶未醒也面青脈伏四肢逆冷但知其體肥有痰月經先期而至先患腫脹是肝厥耳為寒為熱不得而知之余甚躊躇其時牙猶緊閉姑用著強開之略露一縫窺見舌邊尖碎爛乃知為心肝兩經血分之熱病亟不及詳列脈案因囑先以紫雪丹開之俟其稍醒以犀角羚羊角磨竹瀝等頻灌之半時即醒乃繼之以方藥而列脈案如右初病腫脹脹屬肝腫屬脾木強土弱木強則生火土弱則聚濕濕為火爍則凝而為痰火熱盛而動風則手足抽搦肝陽為痰濕所遏鬱而暴發挾痰以上升則發厥上蒙清竅則神昏今竅已開神識已清但兩手脈皆沉伏不見名曰伏匿脈乃熱深厥深之候慎防再厥再昏此際痰火未平亟宜清降舌尖碎心熱也舌邊碎肝熱也由肝及心心肝皆屬血宜清血分之熱肝主疏泄故經期反先時而至但用辛涼以清血勿嫌其性寒阻經也藥為青黛拌石決明二兩竹捲心三錢大丹參三錢西赤芍五錢粉丹皮二錢水炒竹茹三錢後下嫩鉤藤一錢五分衝入鮮竹瀝二兩白萊菔汁一杯枳實汁一匙連三劑而大愈厥未再發又調理肝脾並腫脹亦盡消當時頗有以兩脈伏經來皆余用涼者乃紹庭信余深不之疑因錄出以告時醫之溫病經至而狃於用溫通者熱深厥深致脈伏而誤認為虛寒欲脫者虛喘治病用藥可因此悟彼唐立三治其妹夙苦難產謂瘦胎飲為陽湖公主作以奉養之人氣必實耗其氣使和平故易產今妹形肥知其氣虛勤針鑿久坐知其不運於孕五六月以紫蘇飲加補氣藥與十數帖得男甚快同一難產而有虛實之別補氣之方反從瘦胎方悟出又張仲華案云表熱四候額汗如淋汗時膚冷汗收熱灼診脈虛細惟尺獨滑舌苔已淨細繹脈證不在三陽而在三陰考仲聖有反發熱一條是寒邪深伏少陰陽分今乃濕溫餘邪流入少陰陰分宗其旨變其法擬補腎陰泄腎邪以熟地枸杞等補之細辛丹皮等泄之一劑而愈是從寒邪入腎語出濕溫之邪入腎治法前余診治王立群嗣母病喘詢其狀確係腎家之虛喘而非肺家之實喘閱前方系專科女醫蔡小香君所開用鹹溫重鎮甚合腎氣不納治法惟思服藥何以反甚既以形瘦尺脈帶數也乃悟其故因即原方於其蛤蚧杜仲等之鹹溫者易以阿膠元參之鹹寒於其蘇子之溫降者易以白前之寒降惟旋覆赭石二味來之易亦即其理以對勘之即其法以變用之劑劑字解讀書必先識字為醫亦何獨不然古者造字之初義寓於聲劑劑從齊齊聲即有齊齊義齊者平也藥稱劑劑者即虛者補之實者瀉之熱者寒之寒者溫之之旨故六淫之外因飲食傷之不內外因於我身所本無者則必散之瀉之消之下之而後安七情之內因傷及我身所本有者則必血虧益以血氣虧益以氣而後可凡所以劑其平也俗稱一劑日一帖意亦猶是淫字解人身生氣通於天凡風寒暑濕燥火六氣皆與我身臟腑相感應天地一陰陽五行也人身亦一陰陽五行也然則六氣皆為生人之具而非殺人之物何稱之曰六淫曰此惟過則為害耳淫者過也大水曰淫大雨曰霪佚蕩曰並義寓於聲六氣苟不過極即不得名之曰淫取字解治痿必取陽明內經下一取字大有斟酌近人多以痿為虛症而用補或知其多濕熱症而用瀉實則痿症虛實皆有而治法總在乎陽明故不曰治痿必補陽明亦不曰治痿必瀉陽明而獨曰取也治病不知分經論治其猶瞽者之擿植乎變字解內經於肺氣虛曰溺色變少陰司天熱淫勝曰溺色變釋者多以色黃赤言之實則變者反乎常也與尋常溺色有異即謂之變如米泔色敗醬色黑色皆包括在內不專指黃赤色言經又云冬脈不及小便變陽明司天燥氣下陷小便變釋者亦多以色黃赤言之此更連癃閉不禁皆包括在內不專指黃赤色言並不專指溺色言故不白色變而僅曰變也經又曰中氣不足溲便為之變溲為小便便為大便此更兼大小便而言凡二便之異乎常者一應包括在內而釋者亦多以溺色黃赤言之得毋掛一漏萬耶實則讀書不細耳至於經云肝熱病者小便先黃胃氣盛溺色黃厥陰之勝小便黃赤少陽之勝溺赤然則果系色之為黃為赤為兼黃赤者經固未嘗不明言之又王孟英隨息居霍亂論云干矢自遺而不覺者經謂中氣不足溲便為之變是亦變也所謂不足者非言中氣虛也以中氣為病所阻則不足於降濁升清之職故溲便為之改常也趙菊齋謂霍亂之吐瀉無度乾霍亂之便秘不行皆變也皆中氣為病所阻而不足於降濁升清之職也設泥不足為虛則諸霍亂皆當補中氣為治矣余謂王趙以二便釋溲便以二便失常釋變字俱得經旨但以不足於降濁升清釋不足兩字恐未必確竊以邪之所湊其氣必虛是皆因中氣本虛故邪得而干之有邪即是實當其邪方盛時自斷無補中之理及邪之既去仍宜以補善其後斷未有中氣本足而邪能幹之者然則其標為邪實其本為正虛故不足者不必曲為之解仍以虛釋之自覺直截了當聖人不治已病治未病解金匱云上工治未病何也師曰治未病者見肝之病知肝傳脾當先實脾餘臟准此不謝方序云疾甚曰病謂人於已疾之後未病之先即當早為之藥引說文疾病也病疾加也為證兩說不同愚按內經云善治者治皮毛其次治五臟治五臟者半死半生也以及風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也云云一節俱可為治未病之根據以經證經毫無疑義故扁鵲治齊桓侯在腠理在血脈在腸胃謂為可治在骨髓則望而卻走是未病始治已病則不治也內傷解王孟英述其慈訓曰內傷證必求其所傷何病而先治其傷則病去而元自復古人不曰內虛而曰內傷顧名思義則純虛之證殊少也徐洄溪亦云大凡人非老死即病死其無病而虛死者千不得一況病去則虛者亦生病留則實者亦死孟英又云雖在極虛之人既病即為虛中有實然則近今醫家一遇內傷而專事蠻補者其亦未明傷字之真諦乎經曰不能治其虛焉問其餘既云虛矣猶曰治而不曰補讀書細心者盍味之記諸兄姊妹病故情形余同父之兄姊妹八人四兄六姊八妹均幼殤殤於何病未之前聞也二兄錦煌號仲芾乳名延齡卒於清江旅次年十五歲先是咸豐庚申發逆之亂蘇州陷先父母挈眷避難於豫晉甲子官軍復甦城乙丑眷返里聞諸先母曰在太原延齡已病背腐如碗臥床不能起而弗自知其痛質聰文字俱秀先父劇愛之病後不能文字戲作女紅以自遣未學也而能醫曰譬諸器靈巧者易破歸時路次兜以行抵清江病經年矣易簣時神識清湛謂母曰我目不見物持燈就之仍曰我目不見物繼曰我不支矣遂殂經曰氣脫者目不明又曰陰虛者目盲此虛證也使不遭亂在外有藥餌之滋養無道途之辛勞安必遽夭其天年其長兄三姊五兄九妹之歿則皆余壯年後事長兄錦烺號炳甫肝旺性卞急形瘦色蒼火體也適遇拂意事肝鬱生火延及於胃患中消症嗜食無饜時醫處以養陰之劑予曰但存其陰未撤其熱烏乎可胃火熾甚非石膏知母不為功顧及本其景岳玉女煎乎不聽病日劇而殞三姊歸吳氏生子三女一血熱而少不足以養肝肝氣無所附麗遂竄入絡筋拘不舒氣鬱不散而病作焉某醫處以香燥疏肝加抽搐易貝賦琴先生處以生地羚角橘絡葉等服一劑有孟河世醫費晉卿先生後號者自薦作外感風寒濕致痙治用羌活獨活等連服數劑而日劇吳族有以善針薦者既至不以針而以灸遂神昏面赤舌乾無液以至於死夫香燥疏肝是治血足而肝鬱者也某醫僅知疏肝氣而不知此症之氣鬱由於血虧而氣不相附使然香燥足以爍陰其知之耶貝醫於平肝養血清絡中略佐疏通方極精當而僅僅一劑未竟其功惜哉費醫則外感內傷之未晰內風外風之未辨熱症寒症之未分實醫家之門外漢遑曰世醫吾知九原有知晉卿先生應痛哭於地下也仲景曰微數之脈慎不可灸以艾火大能傷陰也陰虛內熱之體灸之以艾火氣內攻以火濟火陰何以堪仲景謂一逆尚引日再逆促命期矧乎此症之誤一而再再而三哉五兄錦恆號叔和性敏善文章詞賦年十六即遊庠顧屢試不售鬱郁不得志從大令遊宦于越亦浮沉未攝一篆肆志於酒以澆塊壘濕積痰生中氣傷矣辛亥武漢革命軍起越亦亂避難申江偶早起感風寒風寒束於外濕熱蒸於內遂壯熱惡寒舌滑膩醫者初以辛涼解風熱者治之不應復以苦溫消痰飲者繼之復不應遷延焉而卒不救九妹歸張氏婉順有德孝於姑姑將壽自夏徂秋傍晚必登涼臺勤針黹以備為姑壽內蘊暑熱外冒涼風遂患咳不即醫逾半載而成勞乃醫無及矣卒年僅二十有八語云傷風不醒便成勞傷風非絕症也治之非皆不醒也其不醒者不即治故耳諸兄姊妹二哥九妹誤於病而不即醫也長兄三姊五哥誤於醫而非其治也亦可見誤死者之多睠念同懷後先物化孑身孤處盡焉心傷矣記諸子女病殤情形餘子女二十人存者半亡者半長子培植為其外祖父母所溺愛恣其食食不節得疳積症由實而轉虛延鮑竺先生治之愈元未復逾數月秋酷暑侍者挾以嬉於市被驚驟厥未及醫不逾刻而殤是時余以赴秋試舟泊鎮江夜夢齒落隱為憂私以告汪賓谷表兄翌日諸同伴以風逆俱登岸余忽忽若有失辭不去臥舟者竟日家中恐余悲不使知返後乃知殤年四歲四女長堃乳媽嗜酒且時以肉食食之年才期患泄醫者或曰虛或曰實余時不知醫聽之耳旋殤五子培榮隨余上杭任早起嬉戲傷於寒化熱醫用牛黃清心丸遂發狂而死時年十二歲夫發狂而清心猶之可也用清心而乃發狂其為領邪入心包可知余不憾醫憾己於醫道時未明瞭致有此失耳七女孕時母病甚落蓐而即殤十女長平先天本不足尻而行又傷食消之更傷以弱病卒於上杭縣署年二歲十二女清溪體本虛亦傷於食醫以大黃下之重虛其虛以至於脫時年十二歲十六子培復當暑婢抱之遊園中受風又受驚醫之不瘳余素服韓半池大令之術時在杭攜兒以就診登火車汽笛鳴兒又驚抵抗韓辭不治殤於杭之旅舍時年二歲十七子培釐十八子培攣生也氣血分而兩不足一即殤一越半月餘而殤十九女患痘時旅滬上天花時行偶出感其氣遂病時余雖知醫而不精幹痘痘出遍身首無隙如水泡中有黑點內有一大者延他醫治之不愈殤年二歲其間長堃培榮清溪三人似皆可治而失治余由是愈以醫藥為可懼亦由是愈以醫藥為宜究記何鴻舫先生療先母痿症先兄痢疾情形同治戊寅季春先君仁卿公見背先慈汪太淑人以氣血素虧之體驟遭此變心勞力瘁遂得痿症不起床者經年己卯秋外叔祖汪安齋公病迓名醫何鴻舫先生於重古固先慈轉延其診治先生與先大母舅汪子緝本交好先君亦與稔至是診畢責余昆季曰余與君家系世交此病起時何以不早告致困床褥者經年幸也今尚可治遂索紙出方者二一先服數劑一接服數十劑復屈指計曰明年仲春可起行矣屈時侍爾夫人來重固當為轉方當時聽其言疑信參半姑服其方日有起色至正月而可扶床以行二月而不扶亦能行異哉於是赴重固轉方且致謝焉余是以知醫之能起廢疾矣己丑秋五兄叔和應秋試患濕瘡將入闈求速愈用一掃光治之愈實劫劑也旋返在禾郡汪氏寓疾復作變為痢禾醫治之匝月痢已止口糜呃逆神倦無力不思食有欲脫之狀時先母亦在禾信至家告病亟速余往余素服何醫指何鴻舫之神遣僕持函往邀之余亦即赴禾至則醫曰病去矣體虛甚宜進補用阿膠等煎成為貓所傾再煎再傾異之余曰何先生來否即有確信盍停藥以俟之傍晚何先生至診脈良久忽仰首曰三焦均未通奈何旋檢從前所服方依次閱之至末頁見阿膠方忽拍案曰此方服否服則不救矣因告以為貓所傾者再未之服何曰未服則猶可因謂余曰口糜濕滯熏蒸也呃逆下不通反乎上也不思食濕滯阻塞也大實若羸三焦均窒須導之仍痢乃佳並曰病不去則終死余與君家系世交不作應酬方余宿舟候信服余劑夜仍痢則有生機明當再診設通之而不通余劑適更速其斃期在明日余亦明早返棹矣言之甚決余因將再痢可愈之說稟我母告我嫂其不復痢則斃之說不敢言也憂甚徹夜無寐天微明內室門啟有婢出亟詢之曰昨夜又痢十一次狂喜亟登舟告何先生先生亦喜登岸再診診畢曰可以生但需時日耳又曰余女病甚危須急返待余治故婿同來先生之婿彭君文伯本余友彭亦急促其翁返堅留之不可余曰我不知醫先生去無繼其任者是先生生之而復棄之也奈之何先生尋思良久曰有松江王松亭者余門下士在禾行醫盍覓之遣僕四出未幾王醫來詢之乃王鬥槎之弟鬥槎亦余至交也何乃疏方二紙一為痢未淨之方一為痢已清之方紙背列藥幾滿見何證有何脈則增減何味蓋一方而不啻數十方焉將方交王醫一一為王預言將來之情狀且謂必依次下五色痢初青黑次之黃次之赤次之白又次之無害詢其故曰積應臟色也肺位最高白積下則痢清矣又屈指計曰某日晨必神沉欲脫勿藥勿擾靜俟之無害詢其故曰霜降節令也氣先三日至常人不覺而病人則必加劇耳繼而王醫守其方治之盡如其言愈余是以知醫之能殺人能生人矣余之究心於醫術自見何先生愈我母我兄病而始記繼室汪氏怯病治愈情形丙午春余以忤長官罷職歸寓湖州子女林立而宦囊如洗繼室汪氏憂甚肝鬱生火木火刑金得咳症余不敢自醫延醫醫之久不愈且日劇加經斷吐血繼以白血大便艱醫咸曰怯成矣辭不治余乃遍檢方書用千金方意以生粉沙參一味治之日服五錢五日後便中下血塊者一再服又下血塊者二咳頓止乃以百合冬蟲夏草兩味常服之元日復飲食漸如常又數月覺腹脹如向來經將至之狀余亦意其可至也用丹皮之辛以動之丹參之咸以降之果通病全愈始終未用養陰養血之套藥也蓋肺與大腸相表裡臟病而驅之自腑出則肺不病肺不病則自能制肝雖病起於肝未嘗治之而火自平矣記侄培勳生時僵子培治病厥均獲救情形外祖汪星階公名曜奎好方書輯有續經驗方行世故先母汪太夫人竊聞諸論備知方法常曰藥性吾不知但聞方法之有益無害者默志之亦足以備緩急長嫂周氏懷孕七月患瘧寒戰劇胎為之墜時雖七月而秋寒特甚胎下無啼聲面色白肢冷氣絕母命勿斷其臍以紙捻蘸香油熏之並徐擠其暖氣送入腹熏至臍枯而斷搦以指弗使泄氣乃扎束而兒早呱然醒矣即今三侄培勳也案薛己治荊婦孟冬分娩艱難勞傷元氣產子已死用油捻燃燒斷臍藉其氣以暖之俄頃忽作聲苟非素知此法幾何不誤一命耶其小兒胎墜七月者可生八月者反不生何也以七月為陽月也二子培治驟患厥手足逆冷勢劇不及延醫母曰厥逆有寒熱之分藥非醫來弗誤投有法在不分寒厥熱厥可用者命抱入密室不透風處以中多幅絞熱水數人分熨其四肢稍冷即易弗暫停俄而漸溫乃延醫診治之而愈又先母於諸婦生產時必預備千年疑艾一盆早收惡露穢氣也醋炭兩物曰防血暈也冬月則火爐曰禦寒氣也夏月則井水曰收暑氣也以及參湯洋參湯白花益母草湯罔弗齊並曰寧備焉而不用勿用焉而不備記三女長鈞病熱厥八女佩玢慢脾獲愈情形三女長鈞數歲時在其外家南塘鎮張氏患病手足厥冷鄉醫有王姓者處以肉桂內弟張君駿八以鄉間藥不良遣人來城購取並通信告余余瞿然曰厥有寒熱之殊肉桂可輕試耶遂懷藥邀城醫李彤伯先生同赴鄉李診之曰熱厥也治以四逆散而愈向使鄉有佳桂誤一命矣八女佩玢余以斷絃無內助寄養於禾郡叔和五兄處患驚日久不效加劇余聞信飛棹往見其面色㿠唇舌色淡啼如鴉而低亦無多聲伏乳婦肩若倦甚者欲睡而睡不安不思乳小便清大便溏而神識則甚清檢所服方皆消痰清火散風止驚之劑所以治急驚風者也余時雖喜覽方書不甚了了疑屬福幼編所謂慢脾者然禾醫盡延過無可商酌姑用莊在田法以附桂萸術姜五味熬濃汁令乳婦頻頻飫之時餘六母舅汪公爾祉亦寓禾郡開方後謁母舅母舅問狀告以故母舅詫曰爾知醫耶附桂可亂用耶余因之轉疑慮姑察其藥後何狀則安睡矣睡甚久醒則索乳矣疑乃釋遂依據莊氏法以治之獲瘳時實未能真知灼見也詭遇耳略知醫理而未能精通者幸勿效諸記侄培本故於腫病情形侄培本號心源患腹腫醫作濕熱實症治用中滿分消湯去參萸二姜余素知其腎虧曰此病實中有虛須兼顧本並檢示以各方書不聽既而愈更以余為謾言矣余與旁人言必復發既而果然醫不知變仍治以前法僅加白朮山藥等健脾藥余曰殆矣適侄婿曹融甫來名醫曹智涵之子也余謂侄曰盍邀諸曹診畢用金匱腎氣丸加減焉而易以湯侄輩素懼附桂之熱者不敢飲病日篤遂卒卒時見種種心腎不交象余曰藥既對病雖附子肉桂之大熱石膏龍膽之大寒麻黃細辛之外竄大黃芒硝之下奪俱足以生人苟不對症即小小感冒風溫而治以辛溫之荊防風寒而治以辛涼之前蒡亦足以輕病轉重倘怵於大熱大寒而不同古來何必有此藥哉記侄培俊夫婦再侄成懋均死於傷食情形從侄培俊號君彥遇拂意事肝本郁飽食後遊留園見有市蟹粉饅頭者素所嗜又食五枚返家而厥食厥也旋醒醫來用消導藥余曰食在胃中則宜消轉入大腸則宜下今滿填至膈盍用吐法醫曰吐則氣逆其如再厥何余曰誠哉是言也但膈與胃腸食滯充塞氣道艱通轉輸亦鈍必俟大腸之宿垢下而後胃之宿食動必俟胃之宿食化而轉入腸而後胸膈胃口之新食入於胃入於胃仍必俟化而轉入腸恐病去而氣液與之俱去耳因知吐法非萬全也但考古謂新食宜吐宿食宜消亦非無見使吐而不再厥或厥而即醒食去其半氣得其通便易於措治矣未敢試滯盡下而脫侄婦程氏即君彥之室也曾有血症亦不常發患虛信補但聞補者即嗜之余勸曰虛有陰陽氣血之分即物有補陰補陽補氣補血之別況血症未必即屬虛乎不聽常服紫河車余又勸曰紫河車之為物罕可用者以其或有黴病蘊毒之胞食反有害亦不聽某日與其母其兄會飲有辛辣物食過量飽食填膺息驟湧狂吐繼以血血不止醫治之無效後余在濟陽得家報知再從侄成懋系君彥之次子也亦以傷食失治而殞夫婦父子三人均死於食語曰禍從口出病從口入謂言之不可不慎食之不可不節也可不做哉以上八則丙辰陰曆九月十一日在濟陽署公餘之暇寂坐衙齋默計十年前三姊於是日身故為之愴然因追憶情狀筆為記並連及數事醫愈者少半醫死者反大半宜乎古人謂不服藥為中醫哉醫談錄舊陸晉笙弁言閱舊小說家往往記載醫事其間頗有中肯要處因而掇拾輯為一帙茲者印鄙著景景醫話以其相類也故附編於後三焦有名無形辨明仁和薑蓉塘南半村野人閒談載蘇黃門龍川志云彭山有隱者通古醫術與世諸醫所用法不同人莫知之單驟從之學盡得其術遂以醫名於世治平中予與驤遇干廣都論古今術同異驟既言其略復嘆曰古人論五臟六腑其說有謬者而相承不察今欲以告人人誰信者古說左腎其府膀胱右腎命門其府三焦丈夫以藏精女子以系包以理言之三焦當如膀胱故可以藏有所繫若其無形尚可以藏系哉且其所以謂之三焦者何也三焦分布人體中有上中下之異方人心湛寂欲念不起則精氣散在三焦榮華百骸及其欲念一起心火熾然翕撮三焦精氣入命門之府輸瀉而去故號此腑為三焦耳世承叔和之謬而不悟可為長嘆息也予甚異其說後為齊州從事有一舉子齊遁者石守道之婿也少嘗學醫於衛州聞高敏之遺說療病有精思予為道驤之言遁喜曰齊嘗大飢群句相臠割而食有一人皮肉盡而骨脈全者遁以學醫往觀其五臟見右腎下有脂膜如手大者正與膀胱相對有二白脈自其中出夾脊而上貫腦意此即導引家所謂夾脊雙關者而不悟脂膜如手大者之為二焦也單君之言與所見懸合可以正古人之謬矣今醫家者流皆執叔和三焦無狀空有名以自信不聞有此說故錄之燧按謂三焦有名無形始於秦越人然愚以為乃軀殼內臟腑外之脂膜高處焦者高也非氣也但以氣道所流通用藥則宜氣藥而不宜血藥耳病笑德清陳雲瞻尚古簪云樓雜說載先達李其姓歸德府鹿邑人也世為農家癸卯獲雋於鄉伊父以喜故失聲大笑乃春舉進士其笑彌甚歷十年擢諫垣遂成痼疾初猶間發後宵旦不能休大諫甚優之從容語太醫院某因得所授命家人結乃父云大諫已歿乃父慟絕幾殞如是者十日病漸瘳佯為郵語云大諫治以趙大夫絕而復甦李因不悲而笑症永不作矣蓋醫者意也過喜則傷濟以悲而乃和技進乎道矣燧按此深得內經喜傷心恐勝喜恐傷腎思勝恐思傷脾怒勝思怒傷肝悲勝怒憂傷肺喜勝憂之旨知此可與言治七情病矣過食辛辣成毒又載烏程顧文虎累葉簪纓習享豐豫忽一日促家人持竹批解褲受杖後習為故常用稍輕輒加呵責或反以杖杖之必重下乃呼快心如是數年漸覺疼痛而止醫者聞之曰過嗜辛辣發物則熱毒內江因成奇癢適打散不致上攻否則疽發背而死矣此富貴之人炯鑑也頭痛譚瀛云山右傅青主徵君山精醫今所傳世者僅婦科書顧不徒精婦科也有同鄉某客都中忽患頭痛經多醫不效聞太醫院某公為國手斷人生死不爽特造請診治公按脈畢命之曰此一月症也可速歸家料理後事遲無及矣某聞怏怏歸寓急治任兼程旋里會徵君入都遇諸途問某歸意以疾告曰太醫院某君今國手也盍請治之某嘆曰僕此歸正遵某公命也乃具告所言徵君駭曰果爾奈何試為汝脈之按脈良久嘆曰某公真國手也其言不謬某固知徵君技不在某公下泫然泣曰誠如君言某真無生望矣然君久著和緩名竟不能生死人而肉白骨乎徵君又沉思久之謂曰汝疾萬無生理今思得一法愈則不任功不愈亦不任過汝如法試之何如某大喜求方徵君命歸家遍覓健少所著舊氈笠十餘枚煎濃湯漉成膏旦夕服之疾果瘥尋至都中見徵君喜慰異常趨往謁某公公見某至瞿然曰君猶無恙耶具以徵君所治之法告之公嘆曰傅君神醫吾不及也吾初診汝疾系腦髓虧耗按古方唯生人腦可療顧萬不能致則疾亦別無治法今傅君以健少氈笠多枚代之真神手吾不及也若非傅君汝白骨寒矣謂非為鄙人所誤耶解滷汁紀曉嵐昀如是我聞載飲滷汁者血疑凝而死無藥可醫里有婦人飲此者方張皇莫措忽一媼排闔入曰可急取隔壁賣豆腐家所磨豆漿灌之滷得豆漿則凝漿為腐而不至於凝血我是前村老狐曾聞仙人言此方也經阻腹大嘔不納穀上海毛祥麟對山快心醒睡錄載治繆理堂司馬細君經阻年餘腹形漸大嘔不納穀日僅飲藕汁一二杯已待斃矣延余往診見其弱不勝衣喘不成語按脈左三部細若遊絲而右關獨大知疾在厥陰而損及太陰閱前醫立案或言氣言聚或言癥瘕雜投辛香燥散以至危殆爰以甘緩之劑一進而逆止再進而食增繼以育陰益氣經月而脹滿悉除矣是症初不過液枯氣結木乘中土惟攻伐過甚陰液日涸遂至肝陽莫制陽明受困夫陽土喜柔甘能緩急進甘緩者治肝即所以救胃此一舉兼備法也浮腫毛又云癸丑寓鄉有舵工子夏患瘡癢醫投苦寒之品至秋漸至浮腫繼延幼科更進利導腫勢日甚病及半年僅存一息絕食已二日矣或謂余知醫其父遂踵門求治余鑑其誠往視腫勢已甚面目幾不可辨脈亦無從據按因思病久必虛且多服寒涼脾土益衰而及於腎腎水泛溢三焦停滯水滲皮膚注於肌肉水盈則氣促而欲脫擬急進獨參湯以助肺氣蓋肺主一身氣化且有金水相生之義也時鄉間無以覓參乃以仙居術一兩令濃煎盡一器服之喉間痰聲覺漸退於是特進六君子湯重用參朮甫半月而腫盡消此二症皆以平淡取效可見方不在奇在用之得當耳霍亂吐瀉毛又云夏令暑熱炎蒸濕濁上騰人在蒸淫熱迫中設或正氣不足最易感病矧南方地卑氣薄更多中痧吐瀉之症推其致病之原或過於貪涼風寒外受或困於行路暑濕相干或口腹不慎為冷膩所滯或飲食不節使輸化失宜或感時行疫癘之邪或觸穢惡不正之氣皆能致脾土不運陰陽反戾升降失司卒然腹痛上下奔迫四肢厥冷吐瀉並作津液頓亡則宗筋失養故足攣筋縮先起兩腿或見四肢名曰霍亂轉筋生死瞬息年來此症大行我色地窄人稠互相傳染甚有一家數人同時告斃深可畏也茲故不揣鄙陋爰擬一方名曰聖治入夏可預合備用如遇疫癘時行痧暑並觸或感穢或入病家心懷疑慮胸覺痞悶時藉以一丸入口以解穢卻邪勿亂其氣方用正號仙居野術烘燥勿令焦黑二兩真川厚朴二兩白檀香研細末一兩真降香研細末一兩新會皮用鹽水炒二兩以上五味再同研為極細末以廣蕾香六兩煎濃湯泛丸如大黃豆大每眼二三丸細嚼和津嚥下按術味甘能和脾苦能燥濕定中止嘔扶正卻邪開胃氣以除積飲故用以為君樸苦辛能瀉實而化濕平胃調中消痰行水兼治瀉痢嘔惡陳皮為脾肺氣分之藥能快膈導滯宣通五臟並可除寒散表故用此二味為臣檀香調脾利膈正氣驅邪降香能闢穢惡怪異之氣故用為佐使藿香稟清和芬芳之氣為達脾肺之要藥氣機通暢則邪逆自定故用為引其曰聖治者以聖人有治病治未病之旨蓋思患預防莫若眼藥於未病之先使輕者解散而重者化輕未必非卻病養生之一助云生螺鯁喉譚瀛載富翁某中年舉一雄甫周碎忽終日啼哭滴乳不食舉家憂惶延多醫商治籌商立方藥不下咽柬手無策次第散去中有某醫素專治小兒其術甚精再三諦視指紋知兒固無病竊希厚酬獨留不去而展轉思維卒不喻其啼哭不乳之故偶遊後園見乳姆於荷池為兒洗灌衣袴蓬頭悲泣問其何泣之哀答曰妾一家老幼不下十口皆賴妾在此乳兒得不凍餒今兒疾不治一家斷難存活那得不哭醫聞是乳姆其心忽動乃曰我醫也再四諦視指紋兒實無病但不喻其啼哭不乳之故汝若知之可悉告我我當設法治之若是則汝家溫飽我亦得厚酬矣未審汝知之否乳姆聞之惶遽投地悄語之曰先生必秘勿告翁妾乃敢言醫曰諾乃曰前日抱兒戲池畔兒掬石上生螺納諸口中妾急以指掬之已鯁喉際從此啼哭滴乳不食此致病之由惟妾一人知之先生未審果能治之否醫撫掌笑曰得之矣見翁笑賀曰頃思得一良法疾可立愈囑翁速購肥鴨百頭繩系其足而倒懸之以盎承鴨嘴所流涎沫若干用銚頻挹注兒口中不炊許時兒啼哭頓止且以手索乳哺矣轉女為男天長宣鼎瘦梅夜雨秋燈錄載吾鄉史苕媚明經為人慷慨好施老年望孫念切子婦懷孕未卜男女時有精岐黃之道不屑以醫名者苕媚延診其人曰脈主得女然吾翁之善可迴天意請竭吾術使轉為男以報知己第陽莖須移一肢改造得男必缺一肢翁願之否苕媚詫曰先生之學素所敬佩不意竟能化女為男無已請移其足趾無礙觀瞻更妙其人曰不能上可移下下不能移上再三籌度惟兩手小指無用可以挪惜苕楣欣然諾謝遂設爐煉藥佩服兼行及期果產男孩手僅八指見客靦腆宛若閨閣中人又載姑蘇有老翁富而無嗣僅生一女及笄病篤醫皆束手聘名醫葉天士診之笑曰是非病也肯以若女為我女且從我遊百日後還閣下以壯健者如遲疑不決是翁自殺之死非正命良可哀也翁詫曰誠如是願以千金為壽天士攜歸另潔密室選婢之美而豔者使伴女宿囑曰此汝姑也終身依依在是順姑無違稍有拂逆致增其病惟汝是問於是日給藥餌恆往之見女體漸壯容漸舒與婢情好日密形影相隨知事已遂遽入其室迫喝婢曰汝與姑所作何事我窺覘洞徹必盡言之如敢隱諱將以刑求毋自苦也婢視女而泣女忸怩曰婢之伴我翁之嚴命如違應責順何罪耶婢因曰是主陷奴耳以郎君偽稱義女而使奴同衾枕違既不敢從又獲咎使奴置身何地天士大笑曰已順從姑耶方為汝喜豈汝責耶速女改裝去發而辮之以藥展其弓足衣冠履舄居然男子延其父至而告曰閣下以子為女偽疾誑我誤使義女伴之今為其所亂將如之何翁愕然不解所謂乃使兩人出拜顧而大樂願以婢為兒婦與天士結為姻婭往來無間鄉曰變女為男之法見於醫經史以盛德而遇良醫理所應得無足怪者惟葉所治之女其醫經所載之五不男耶名曰天捷妬變半任沖不盛宗筋不成曰天值男即女值女即男曰捷男根不滿似有似無曰妬半月為男半月為女曰變雖有男根不能交媾曰半此五等人狀貌血氣本具男形惟任沖二脈不足似男而不成其男為父母者誤以作女年至十六氣足神旺陽事興矣郁不得發是以病篤幸遇名醫充以妙藥誘以所欲自然陽莖突出不復女矣吾意五不男中除天閹外皆可以藥救也環唇疔譚瀛載杭城某富翁好行善一子七歲環唇生七疔痛徹心髓症甚危殆凡精岐黃者皆羅致家中商榷立方卒無效創且日甚水漿不入醫謝無能相率辭去翁愁思無策坐待其斃而已忽有嫗丐於門聒求無厭閽者呵之翁聞出責閽者如言給媼媼見翁淚承睫詰知兒疾曰此名七星攢月危症也惟十二歲內小兒所下蛔蟲百條搗餅疊敷之可治翁聞媼言入諭於眾比出延媼不知所往而所給之物固在驚以為神如媼言懸格徵求凡有小兒者咸以藥下蛔蟲爭獻求嘗敷之果愈燧按唇為脾胃之應如無蛔蟲以雞內金知母為末加五穀蟲共搗塗之亦可實熱內伏又載錢福耀好善知醫治疾不責謝元旦山行見兩叟坐地談醫一叟蒼髯垂胸一叟豐頤微髭錢頓觸所好拱手請教蒼髯者笑曰汝亦知醫耶對曰然曰醫有三審汝知之乎曰何謂三審曰一審色二審舌三審脈凡為人治疾先審面色由色而辨五行或宜相生或宜相剋次審舌辨其枯潤次審脈之浮沉遲數以分表裡虛實而決其風寒濕熱三審既確然後斟酌立方百不失一汝第識吾言神而明之能事畢矣錢頓首領教請問兩叟姓名微髭者指蒼髯者謂曰此三國時華元化先生予乃唐時孫思邈也錢大驚知為遇仙急僕伏叩首及仰視杳矣自是醫理日進會太守有母暑月患疾衣重裘尚自惡寒群醫金以熱劑投之不效延錢診治觀病者兩顴赤舌色黑燥確係實熱內伏攻去內熱外邪自去急命飽飲瓜汁少選泄去惡滯儡然熟睡寤後汗出如雨其疾良瘥虛寒中風又載中丞某公於中秋忽白睛上泛驟然倒地手足攣搐多醫相視不敢立方錢見某公面白微青舌白而潤意中秋金氣得令涼風乘虛而入引動內風症屬虛寒治宜扶火泄金培土製木遂進參耆朮桂等藥而疾頓愈膈東軒主人述異記載楚武昌府漢陽門內舊有陳友諒廣積倉基今皆為民治康熙甲子年有地中掘得黑米者黑如漆堅如石炒之即松研為末治膈症如神臨海教諭吳牖丹在楚親見言之失明祖臺之志怪錄載吳中書郎盛衝至孝母王氏失明沖暫行動婢食母婢乃以蠐螬齏食之王氏甚美然非魚肉母謂沖曰汝試問之既而問婢服實見蠐螬沖抱母慟哭而目立開本草經曰蠐螬一名蟦齊主治血瘴痘時報載凌頌和患痘須知九條云一痘發五六日痘當出齊看是否出齊以腳心為驗腳心有痘則出齊矣然痘稀少者亦不拘此總以邪熱退而痘為出齊矣若一發便出齊者勢必重也一先發驚而後發痘者多安先發痘而後發驚者多危名曰驚痘一用手揩摩面頰如紅隨手轉白白隨轉紅謂之血活可治如揩之不白舉之不紅謂之血枯雖疏難治一痘未開盤而頭面先腫此元氣大虛名為虛腫非起脹也其痘不能起脹宜大補元氣腫自消而脹自起若痘已回而腫不消是元氣大虛不能攝毒盡化為漿餘毒留於肌膚之間所致一痘從正額兩顴先見者多順人中口鼻先見者多險或口唇目胞先浮腫者此脾胃受毒尤險太陽頤腮耳先見者多逆其不能先見於上部而反見於下部者亦元氣不振耳其起漿收痂亦回一諸處痘不起惟面部及臀上痘有漿起綻者可治有面部痘好惟鼻上無痘或有痘不出綻行漿者皆難治四肢有漿惟身面無漿者難治全身痘漿灌足惟面上不行漿者死全身痘色紅活惟面部焦估者難治周身痘好惟兩足膝下全無者凶若面半以上稠密灰滯而面半以下勻明綻澤者名云掩天庭難治抑諸處出齊勻朗紅潤而腰間稠密灰滯作痛者名纏腰此毒滯千陰不能成漿九日危遲則不過十一日也一痘色紫中帶黑焦枯者乃純陽無陰之症其人必口乾畏寒小便短大便結宜清火解毒但得灌漿猶望生活一顆粒疏綻根盤紅潤精神爽健二便如常吉痘也勿藥有喜一痘中有紫黑乾硬暴脹獨大腳無紅暈或疼或不疼者即痘疔也痘疔能閉諸毒未齊有疔則諸痘不能出既齊有疔則諸痘不能起脹行漿時有疔則諸痘必致倒陷故初出時見有紫黑獨大之點恐其成疔即宜以銀針挑破吸盡毒血然後以拔疔散敷之次日復看若再硬脹仍然刺破以前藥敷之必轉紅活方可已也若針挑不動手捻有核則成疔矣須用針從四邊刳開以小鉗鉗出其形如疔有寸許長拔去其疔仍以前藥敷瘡口乃可無虞又四肢有痘慘暗堅硬而甚痛或外無痘而內有核作痛者亦痘疔也宜以艾火燒之即愈或以燈火烙之亦效若不急治則此粒痘深陷穿筋透髓而爛見骨甚可畏也又天庭有黑點心窩舌上必有疔地角有黑點陰囊陰戶必有疔兩顴有黑點兩腋必有疔準頭有黑點四肢必有疔此觀顯可知其隱又不可不詳也又痘大色黃如金者名賊痘大而黑者為痘疔當以銀針挑破吸盡毒血拔疔散敷之附拔疔散方水飛明雄黃二錢胭脂粒五錢無則胭脂膏亦可共為細末凡遇痘疔賊痘刺出黑血敷之立能上痛神效儻舌上痘疔用銅綠銀硃硃砂雄黃人中白等分共研勻探之食鴨成癥宋劉敬叔異苑載元嘉中章安有人噉鴨肉乃成瘕病胸滿面赤不得飲食醫令服秫術須臾煩悶吐一鴨雛身啄翅皆已成就惟左腳故綴昔所食肉病遂獲瘥發癥又載有人誤吞發便得病但欲咽豬脂張口時見喉中有一頭出受膏乃取小鉤為餌而引得一物長三尺余其形似蛇而悉是豬脂懸於屋間旬日融盡惟發在焉中痰明鄭仲夔胄師耳新載嚴分宜朝退忽暴疾家人救不醒京師名醫延請略遍而眼藥都不少效舉家惶惶且欲議後事有彭孔者善醫而甚無名聞而自薦入視修一劑謂分宜夫人曰飲此當嘔出多痰痰去至夜半方醒明晨可全無事若吾來遲即無濟矣諸醫咸目笑之煎服有頃果嘔痰數升再服復睡去至三更忽能言次日遂愈孔由是知名大為分宜用事燧按名公巨卿信虛喜補醫家以逢迎以卸責雖見症確鑿不敢放手用攻比比皆是可慨也脾疾禾水包公剡汝輯南中紀聞載靖州南二十里飛山砦相傳為元末朱都督屯兵之所牆礫間時有米粒色微黑而不腐云是朱公所遺兵糧遊客謁神祠取輒得之至今尚有服之可療脾疾此亦一段奇蹟聞衡山有仙人糧斯其彷彿歟燧按相傳黑米能治膈症治脾胃也頗有理在猘犬傷華亭陳繼儒群碎錄載左傳云國狗之瘛無不噬也杜預注云瘛狂犬也今云猘犬宋書云張收為猘犬所傷食蝦膜膾而愈又椎碎杏仁納傷處即愈邪祟交合李王枕甫逋肱蚓庵瑣語載新安程孝廉名光字奕先奉呂祖甚虔忽有黑氣入裩中似覺婦人之陰一接而精大泄符藥不靈一日遇一道人教具佩麝香可愈初佩不多未驗後佩兩餘其祟遂絕噎吳江鈕玉樵誘觚𪒟載武昌小南門外獻花寺僧自究病噎百藥不效臨歿謂其徒曰我毒獨罹此患胸臆必有物為祟逝後剖去殮我我感之入地矣其徒如教得一骨如簪收置經案久相傳示閱歲適有戎帥寓寺從者殺鵝未斷其喉偶見此骨取以挑刺鵝血噴發而骨遂消滅自究之徒亦病噎因悟鵝血可治數飲遂愈遍以此方授人無不驗者燧按蘇恭謂鵝毛灰治噎不獨血也龜癥產明楊循吉蓬軒吳記載葛可久國初名醫有奇驗一人患腹疼延葛治葛視之謂其家曰腹有肉龜俟熟睡吾針之勿令患者知知則龜藏矣患者問故家人誑曰醫云寒氣凝結多飲釀酒自散耳患者乃引筋劇飲沉酣而臥家人亟報葛葛診其脈以針刺其腹患者驚寤界以藥須臾有物下儼如龜厥首有穴蓋針所中也病遂愈又一鄰婦娠將娩氣上逆痛不可忍就葛視葛見之遽以掌擊案厲聲大叱婦驚產一子葛慰曰向見爾色青氣逆是腹中兒上攻少緩不可救矣猝然被驚故即產也其神驗如此燧按三尸為患亦不能明告患者何病何藥告則其蟲避不飲藥矣又驚則氣下故葛之治二病如此
