front:
  text: 序歲在癸丑懸壺滬讀余君伯陶創立醫報索稿甚急操觚以應名曰醫話聊資談助甲寅初春復入政界僅此五期積帙無幾嗣復續記亦極寥寥而我友朋索抄日眾爰付梓民藉以贈人本非專門自維譾陋就正有道匡予不逮幸甚盼甚古吳晉笙陸錦燧志
  hash: sha256:75e042a1a118a75c8be56359e108170bd0814fe0a553dcd957469a8237fb39b5
